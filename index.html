<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <script src="//cdn.jsdelivr.net/gh/clappr/clappr-level-selector-plugin@latest/dist/level-selector.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>NexoPlayer - Online Live TV Player</title>
    <link rel="shortcut icon" type="x-icon" href="images/tv_icon.png">
    <meta name="title" content="NexoPlayer - Online Live TV Player" />
    <meta name="description" content="NexoPlayer is an online live TV player." />
</head>

<body>
    <header class="header">
        <nav>
            <div class="logo">
                <a href="#">NexoPlayer</a>
            </div>
            <!-- স্ক্রিনশটের মতো সরাসরি ডানপাশের অ্যাকশন লিঙ্কসমূহ -->
            <div class="nav-links">
                <a href="#" id="add-m3u-link">Add M3U Link</a>
                <a href="#" id="removelist">Remove Playlist</a>
            </div>
        </nav>
    </header>

    <!-- প্লেলিস্ট অ্যাড করার ফর্ম (যা লিঙ্কে ক্লিক করলে প্লেয়ারের নিচে বা উপরে টগল হবে) -->
    <div id="m3u-form-container" class="hidden">
        <div class="m3u-form-content">
            <input type="url" id="m3u-link" placeholder="Enter M3U URL">
            <button id="load-m3u">Load Playlist</button>
        </div>
    </div>

    <!-- Main Content Layout -->
    <div id="main-container">
        <!-- প্লেয়ার কন্টেইনার -->
        <div id="player-wrapper">
            <div id="player-container">
                <!-- Player will load here -->
            </div>
        </div>

        <!-- চ্যানেল লিস্ট বক্স (হুবহু স্ক্রিনশটের মতো ডার্ক কার্ড থিম) -->
        <div id="channel-list-container">
            <h2 id="channel-heading">Channels</h2>
            <div id="channel-list">
                <ul id="channels"></ul>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div id="footer-container">
            <p>&copy; 2026 NexoPlayer. All rights reserved.</p>
            <p>Made with ❤️ by NBSOFTDEV</p>
        </div>
    </footer>

    <!-- Custom Alert Dialog -->
    <div id="custom-alert-dialog">
        <div class="alert-content">
            <p>Are you sure you want to remove the playlist?</p>
            <div class="alert-btns">
                <button id="confirm-remove">Yes</button>
                <button id="cancel-remove">No</button>
            </div>
        </div>
    </div>

    <script src="js/player.index.js"></script>
</body>

</html>
