<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Clappr Core & Level Selector -->
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <script src="//cdn.jsdelivr.net/gh/clappr/clappr-level-selector-plugin@latest/dist/level-selector.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>NexoPlayer - Premium Live TV Experience</title>
    <link rel="shortcut icon" type="x-icon" href="images/tv_icon.png">
    <meta name="title" content="NexoPlayer - Online Live TV Player" />
    <meta name="description" content="NexoPlayer is a premium online live TV player." />
</head>

<body>
    <header class="header">
        <nav>
            <div class="logo">
                <a href="#">NexoPlayer</a>
            </div>
            <!-- Neon Hamburger Menu Button -->
            <div class="menu-icon" id="menu-btn">&#9776;</div>
        </nav>
    </header>

    <!-- Sidebar Drawer -->
    <div id="sidebar-overlay"></div>
    <div id="sidebar-menu">
        <div class="sidebar-header">
            <h3>Navigation</h3>
            <span id="close-sidebar">&times;</span>
        </div>
        <ul>
            <li><a href="#" id="add-m3u-link">Add M3U Playlist</a></li>
            <li><a href="#" id="removelist">Remove Current Playlist</a></li>
        </ul>
        
        <!-- Add Playlist Form inside Sidebar only -->
        <div id="m3u-link-form" class="hidden">
            <label for="m3u-link">External M3U URL</label>
            <input type="url" id="m3u-link" placeholder="https://example.com/playlist.m3u">
            <button id="load-m3u">Load Playlist</button>
        </div>
    </div>

    <!-- Main Content Layout -->
    <div id="main-container">
        <!-- Player Container -->
        <div id="player-wrapper">
            <div id="player-container">
                <!-- Video Player Will Load Here -->
            </div>
        </div>

        <!-- Channels Container with New Instant Search Box -->
        <div id="channel-list-container">
            <h2 id="channel-heading">
                <span>Live Streams</span>
            </h2>
            
            <!-- Instant Search Input -->
            <div class="search-box">
                <input type="text" id="search-channel" placeholder="Search channel name...">
            </div>

            <div id="channel-list">
                <ul id="channels"></ul>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div id="footer-container">
            <p>&copy; 2026 NexoPlayer. All rights reserved.</p>
            <p>Developed with Premium Aesthetics by Rbel Ahmed</p>
        </div>
    </footer>

    <!-- Custom PopUp Dialog -->
    <div id="custom-alert-dialog">
        <div class="alert-content">
            <p>Are you sure you want to remove this playlist from your storage?</p>
            <button id="confirm-remove">Yes, Remove</button>
            <button id="cancel-remove">Cancel</button>
        </div>
    </div>

    <script src="js/player.index.js"></script>
</body>

</html>
